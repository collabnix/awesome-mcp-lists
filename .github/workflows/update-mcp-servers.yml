name: Discover New MCP Tools

on:
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Monday at midnight UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  discover-mcp-tools:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Discover new MCP tools from GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import os
          import re
          import json
          import time
          import requests

          GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN", "")
          README_PATH = "README.md"

          headers = {
              "Authorization": f"Bearer {GITHUB_TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def search_github(query, per_page=30):
              """Search GitHub repositories and return a list of results."""
              url = "https://api.github.com/search/repositories"
              params = {
                  "q": query,
                  "sort": "stars",
                  "order": "desc",
                  "per_page": per_page,
              }
              try:
                  resp = requests.get(url, headers=headers, params=params, timeout=30)
                  resp.raise_for_status()
                  return resp.json().get("items", [])
              except Exception as e:
                  print(f"Warning: search failed for '{query}': {e}")
                  return []

          def extract_existing_urls(readme_content):
              """Extract all GitHub repo URLs already referenced in the README."""
              pattern = r'https://github\.com/([\w.-]+/[\w.-]+)/?'
              matches = re.findall(pattern, readme_content)
              return {m.lower().rstrip('/') for m in matches}

          def categorize_repo(repo):
              """Return a category name based on repo topics and description."""
              topics = [t.lower() for t in repo.get("topics", [])]
              description = (repo.get("description") or "").lower()
              name = repo.get("name", "").lower()

              combined = " ".join(topics) + " " + description + " " + name

              if any(kw in combined for kw in ["database", "postgres", "mysql", "sqlite", "mongo", "redis", "storage", "db"]):
                  return "Database & Storage"
              if any(kw in combined for kw in ["devops", "kubernetes", "docker", "terraform", "ci", "cd", "infrastructure", "k8s", "helm"]):
                  return "DevOps & Infrastructure"
              if any(kw in combined for kw in ["web", "browser", "crawl", "scrape", "search", "content"]):
                  return "Web & Content"
              if any(kw in combined for kw in ["auth", "security", "crypto", "vault", "secret"]):
                  return "Security & Authentication"
              if any(kw in combined for kw in ["ai", "ml", "llm", "machine learning", "openai", "anthropic", "embedding"]):
                  return "AI & Machine Learning"
              if any(kw in combined for kw in ["slack", "discord", "email", "chat", "messaging", "communication", "telegram"]):
                  return "Communication"
              if any(kw in combined for kw in ["stripe", "shopify", "payment", "api", "integration", "webhook"]):
                  return "Integrations & APIs"
              if any(kw in combined for kw in ["note", "wiki", "knowledge", "obsidian", "notion"]):
                  return "Knowledge Management"
              if any(kw in combined for kw in ["image", "video", "audio", "media", "design", "photo"]):
                  return "Multimedia & Design"
              return "Development Tools"

          def find_section_end(lines, section_name):
              """Find the last table row line index within the given section."""
              in_section = False
              last_row_idx = -1
              for i, line in enumerate(lines):
                  if line.strip().startswith("### ") and section_name in line:
                      in_section = True
                      continue
                  if in_section:
                      if line.strip().startswith("### ") or line.strip().startswith("## "):
                          break
                      if line.strip().startswith("|") and not line.strip().startswith("|---|") and line.count("|") >= 4:
                          last_row_idx = i
              return last_row_idx

          def current_row_count(lines, section_name):
              """Count data rows (not header/separator) in the section's table."""
              in_section = False
              count = 0
              for line in lines:
                  if line.strip().startswith("### ") and section_name in line:
                      in_section = True
                      continue
                  if in_section:
                      if line.strip().startswith("### ") or line.strip().startswith("## "):
                          break
                      stripped = line.strip()
                      if stripped.startswith("|") and not stripped.startswith("|---|") and not stripped.startswith("| #") and stripped.count("|") >= 4:
                          count += 1
              return count

          # --- Main logic ---
          with open(README_PATH, "r", encoding="utf-8") as f:
              readme = f.read()

          existing_urls = extract_existing_urls(readme)
          print(f"Found {len(existing_urls)} existing GitHub repo references in README.")

          # Search GitHub for MCP server repositories
          queries = [
              "topic:mcp-server",
              "topic:model-context-protocol",
              "mcp-server in:name stars:>10",
          ]

          candidates = {}
          for q in queries:
              results = search_github(q, per_page=50)
              for repo in results:
                  full_name = repo.get("full_name", "")
                  if full_name and full_name.lower() not in candidates:
                      candidates[full_name.lower()] = repo
              time.sleep(2)

          print(f"Found {len(candidates)} candidate repos from GitHub search.")

          # Filter to repos not already in the README
          new_repos = []
          for key, repo in candidates.items():
              repo_path = repo["full_name"].lower()
              if repo_path not in existing_urls:
                  new_repos.append(repo)

          print(f"Found {len(new_repos)} new repos not yet in README.")

          if not new_repos:
              print("No new tools found. Exiting.")
              exit(0)

          # Group new repos by category
          by_category = {}
          for repo in new_repos:
              cat = categorize_repo(repo)
              by_category.setdefault(cat, []).append(repo)

          # Insert new rows into README sections
          lines = readme.splitlines(keepends=True)
          added = 0

          for category, repos in by_category.items():
              for repo in repos:
                  name = repo.get("name", "")
                  description = (repo.get("description") or "No description available.").replace("|", "&#124;")
                  url = repo.get("html_url", "")
                  stars = repo.get("stargazers_count", 0)

                  # Skip if description is empty/unhelpful
                  if not description or description == "No description available.":
                      continue

                  insert_idx = find_section_end(lines, category)
                  if insert_idx == -1:
                      print(f"  Section '{category}' not found, skipping {name}")
                      continue

                  row_num = current_row_count(lines, category) + 1
                  new_row = f"| {row_num} | **{name}** | {description} | TBD | [GitHub]({url}) |\n"
                  lines.insert(insert_idx + 1, new_row)
                  print(f"  Added [{category}] {name} ({stars}⭐)")
                  added += 1

          if added == 0:
              print("No rows inserted (all filtered out). Exiting.")
              exit(0)

          with open(README_PATH, "w", encoding="utf-8") as f:
              f.writelines(lines)

          print(f"README.md updated with {added} new tools.")
          PYEOF

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add newly discovered MCP tools from GitHub"
          title: "🔍 Add newly discovered MCP tools from GitHub"
          body: |
            ## 🔍 Automated MCP Tool Discovery

            This PR was automatically generated by the weekly GitHub repository scan.

            ### How it works
            - Searches GitHub for repositories with topics `mcp-server` and `model-context-protocol`
            - Also searches for repos with "mcp-server" in their name with 10+ stars
            - Filters out repositories already listed in the README
            - Categorises new repos and appends them to the relevant sections

            ### Review checklist
            - [ ] Verify each new entry is a genuine MCP server/tool
            - [ ] Check descriptions are accurate
            - [ ] Confirm links are correct
            - [ ] Adjust categories if needed

            Auto-generated by GitHub Actions — please review before merging.
          branch: auto/discover-mcp-tools
          base: main
          labels: automation,mcp-update
          delete-branch: true

